<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Neway RP Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<style>
  :root {
    --bg: #0B1622;
    --card: #162336;
    --accent: #3B82F6;
    --accent2: #60A5FA;
    --text: #E2EAF4;
    --muted: #7A97B8;
    --border: rgba(59,130,246,0.15);
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .icon-inline { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; }
  .login-card {
    width: 100%; max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
  }
  .login-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 1.2rem;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .login-logo svg { width: 26px; height: 26px; }
  .login-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .field label {
    font-size: 0.8rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em;
  }
  .field input {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 0.92rem; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .2s, box-shadow .2s, transform .1s;
    box-shadow: 0 0 24px rgba(59,130,246,.3);
  }
  .btn-login:hover { background: var(--accent2); box-shadow: 0 0 36px rgba(96,165,250,.4); }
  .btn-login:active { transform: scale(.98); }
  .btn-login:disabled { opacity: .5; pointer-events: none; }
  .error-msg {
    display: none;
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    color: #FCA5A5;
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 0.84rem;
    margin-bottom: 18px;
    align-items: center; gap: 8px;
  }
  .error-msg.show { display: flex; }
  .back-link {
    display: block; text-align: center; margin-top: 22px;
    color: var(--muted); font-size: 0.82rem; text-decoration: none;
  }
  .back-link:hover { color: var(--accent2); }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="12" stroke="#60A5FA" stroke-width="2"/>
      <path d="M8 14 L14 8 L20 14 L14 20 Z" fill="#3B82F6" opacity=".7"/>
      <circle cx="14" cy="14" r="3" fill="#60A5FA"/>
    </svg>
    Neway RP
  </div>
  <p class="login-sub">Вход в панель администрации</p>

  <div class="error-msg" id="errorMsg">
    <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Неверный e-mail или пароль</span>
  </div>

  <form id="loginForm" onsubmit="return false;">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" required autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="loginBtn" onclick="doLogin()">
      Войти
      <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
    </button>
  </form>

  <a href="index.html" class="back-link">← Вернуться на главную</a>
</div>

<script>
// Если уже авторизован — сразу в админку
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) window.location.href = 'admin.html';
})();

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');

  if (!email || !password) return;

  errorMsg.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Вход...';

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    errorText.textContent = 'Неверный e-mail или пароль';
    errorMsg.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Войти <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>';
    return;
  }

  window.location.href = 'admin.html';
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
