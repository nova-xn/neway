<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель администрации — Neway RP</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<style>
  :root {
    --bg: #0B1622;
    --surface: #111E2E;
    --card: #162336;
    --card2: #1A2B40;
    --accent: #3B82F6;
    --accent2: #60A5FA;
    --text: #E2EAF4;
    --muted: #7A97B8;
    --border: rgba(59,130,246,0.15);
    --radius: 16px;
    --radius-sm: 9px;
    --green: #4ADE80;
    --red: #F87171;
    --yellow: #FBBF24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    min-height: 100vh;
  }
  .icon-inline { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; flex-shrink: 0; }
  a { color: inherit; }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(11,22,34,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 1.1rem;
    color: var(--accent2);
  }
  .topbar-logo svg { width: 24px; height: 24px; }
  .topbar-right { display: flex; align-items: center; gap: 18px; }
  .admin-email { font-size: 0.82rem; color: var(--muted); }
  .btn-logout {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--muted);
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-logout:hover { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.4); color: var(--red); }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 32px 28px 80px; }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }
  .stat-card .num { font-family: 'Montserrat', sans-serif; font-size: 1.9rem; font-weight: 800; color: var(--accent2); display: block; }
  .stat-card .lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-bottom: 20px;
  }
  .filter-select, .search-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    outline: none;
  }
  .filter-select:focus, .search-input:focus { border-color: var(--accent); }
  .search-input { flex: 1; min-width: 200px; }
  .btn-refresh {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 0.74rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--card2);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(59,130,246,.05); }
  tbody td { padding: 14px 18px; vertical-align: middle; }
  .td-type { font-weight: 600; font-size: 0.85rem; }
  .td-nick { color: var(--muted); font-size: 0.85rem; }
  .td-date { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 0.76rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .badge.new { background: rgba(59,130,246,.15); color: var(--accent2); }
  .badge.approved { background: rgba(74,222,128,.13); color: var(--green); }
  .badge.rejected { background: rgba(248,113,113,.13); color: var(--red); }
  .badge.review { background: rgba(251,191,36,.13); color: var(--yellow); }

  .empty-state {
    text-align: center; padding: 70px 20px; color: var(--muted);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: .5; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5,10,16,.7);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    width: 100%; max-width: 560px; max-height: 86vh;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 30px 32px;
  }
  .modal-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 22px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 { font-family: 'Montserrat', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
  .modal-head p { font-size: 0.8rem; color: var(--muted); }
  .modal-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 4px; border-radius: 6px; transition: all .2s;
  }
  .modal-close:hover { color: var(--text); background: rgba(255,255,255,.06); }
  .modal-close svg { width: 20px; height: 20px; }

  .detail-row { display: flex; gap: 16px; padding: 10px 0; border-bottom: 1px solid rgba(59,130,246,.08); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { flex: 0 0 150px; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; padding-top: 2px; }
  .detail-value { flex: 1; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }

  .modal-actions {
    display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap;
  }
  .btn-action {
    flex: 1; min-width: 120px;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 11px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-size: 0.84rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-action svg { width: 15px; height: 15px; }
  .btn-action.approve:hover { background: rgba(74,222,128,.13); border-color: var(--green); color: var(--green); }
  .btn-action.review:hover { background: rgba(251,191,36,.13); border-color: var(--yellow); color: var(--yellow); }
  .btn-action.reject:hover { background: rgba(248,113,113,.13); border-color: var(--red); color: var(--red); }
  .btn-action.delete { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.25); color: var(--red); }
  .btn-action.delete:hover { background: rgba(248,113,113,.18); }

  .auth-gate {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: var(--muted); font-size: 0.9rem;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 100px; padding: 12px 24px;
    font-size: 0.85rem; font-weight: 600;
    color: var(--text); white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 999;
    display: flex; align-items: center; gap: 9px;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
  #toast.toast-ok { border-color: rgba(74,222,128,.4); color: var(--green); }
  #toast.toast-err { border-color: rgba(248,113,113,.4); color: var(--red); }
  #toast.toast-info { border-color: rgba(59,130,246,.4); color: var(--accent2); }

  /* ── NOTE FIELD IN MODAL ── */
  .modal-note-wrap {
    margin-top: 18px; padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .modal-note-wrap label {
    display: block; font-size: 0.75rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .modal-note-wrap textarea {
    width: 100%; min-height: 72px; resize: vertical;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color .2s;
  }
  .modal-note-wrap textarea:focus { border-color: var(--accent); }
  .note-display {
    background: rgba(59,130,246,.06);
    border: 1px solid rgba(59,130,246,.2);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.88rem; color: var(--muted);
    white-space: pre-wrap; word-break: break-word;
    margin-top: 4px;
  }

  /* ── EXPORT BUTTON ── */
  .btn-export {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(74,222,128,.25);
    background: rgba(74,222,128,.07);
    color: var(--green);
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .btn-export:hover { background: rgba(74,222,128,.14); border-color: var(--green); }

  /* ── SORT HEADER ── */
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: var(--accent2); }
  thead th .sort-arrow { margin-left: 4px; opacity: .4; font-style: normal; }
  thead th.sort-asc .sort-arrow::after { content: '↑'; opacity: 1; }
  thead th.sort-desc .sort-arrow::after { content: '↓'; opacity: 1; }

  @media (max-width: 860px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .table-wrap { overflow-x: auto; }
    table { min-width: 700px; }
  }
</style>
</head>
<body>

<div id="authGate" class="auth-gate">Проверка доступа...</div>

<div id="appRoot" style="display:none;">

<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="12" stroke="#60A5FA" stroke-width="2"/>
      <path d="M8 14 L14 8 L20 14 L14 20 Z" fill="#3B82F6" opacity=".7"/>
      <circle cx="14" cy="14" r="3" fill="#60A5FA"/>
    </svg>
    Neway RP · Admin
  </div>
  <div class="topbar-right">
    <span class="admin-email" id="adminEmail"></span>
    <button class="btn-logout" onclick="doLogout()">
      <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Выйти
    </button>
  </div>
</div>

<div class="wrap">

  <div class="stats-row" id="statsRow" style="grid-template-columns: repeat(5, 1fr);">
    <div class="stat-card"><span class="num" id="statTotal">—</span><span class="lbl">Всего заявок</span></div>
    <div class="stat-card"><span class="num" id="statNew">—</span><span class="lbl">Новые</span></div>
    <div class="stat-card"><span class="num" id="statReview">—</span><span class="lbl">На рассмотрении</span></div>
    <div class="stat-card"><span class="num" id="statApproved">—</span><span class="lbl">Одобрено</span></div>
    <div class="stat-card"><span class="num" id="statRejected">—</span><span class="lbl">Отклонено</span></div>
  </div>

  <div class="toolbar">
    <select class="filter-select" id="filterType" onchange="applyFilters()">
      <option value="">Все типы заявок</option>
    </select>
    <select class="filter-select" id="filterStatus" onchange="applyFilters()">
      <option value="">Все статусы</option>
      <option value="new">Новые</option>
      <option value="review">На рассмотрении</option>
      <option value="approved">Одобрено</option>
      <option value="rejected">Отклонено</option>
    </select>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск по никнейму, email или комментарию..." oninput="applyFilters()">
    <button class="btn-export" onclick="exportCSV()">
      <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Экспорт CSV
    </button>
    <button class="btn-refresh" onclick="loadSubmissions()">
      <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4L21 8"/><path d="M21 3v5h-5"/></svg>
      Обновить
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="sortBy('license_type')">Тип заявки<i class="sort-arrow"></i></th>
          <th class="sortable" onclick="sortBy('nickname')">Никнейм<i class="sort-arrow"></i></th>
          <th>Мессенджер</th>
          <th class="sortable" onclick="sortBy('email')">Email<i class="sort-arrow"></i></th>
          <th class="sortable" onclick="sortBy('status')">Статус<i class="sort-arrow"></i></th>
          <th class="sortable" onclick="sortBy('created_at')">Дата подачи<i class="sort-arrow"></i></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- rows injected by JS -->
      </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      <div>Заявок не найдено</div>
    </div>
  </div>

</div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h3 id="modalTitle">Заявка</h3>
        <p id="modalSubtitle"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-note-wrap">
      <label>Комментарий администратора</label>
      <textarea id="modalNote" placeholder="Причина отказа, пожелания, внутренние заметки..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-action approve" onclick="setStatus('approved')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
        Одобрить
      </button>
      <button class="btn-action review" onclick="setStatus('review')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        На рассмотрение
      </button>
      <button class="btn-action reject" onclick="setStatus('rejected')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        Отклонить
      </button>
      <button class="btn-action delete" onclick="deleteSubmission()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Удалить
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let allSubmissions = [];
let currentRecordId = null;
let sortField = 'created_at';
let sortDir = 'desc';

// ── TOAST ──
let toastTimer = null;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show toast-' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── AUTH GATE ──
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) { window.location.href = 'login.html'; return; }
  document.getElementById('adminEmail').textContent = data.session.user.email;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  loadSubmissions();
})();

supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') window.location.href = 'login.html';
});

async function doLogout() {
  await supabaseClient.auth.signOut();
  window.location.href = 'login.html';
}

// ── LOAD DATA ──
async function loadSubmissions() {
  const { data, error } = await supabaseClient
    .from('submissions').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Ошибка загрузки данных', 'err'); return; }
  allSubmissions = data || [];
  populateTypeFilter();
  renderStats();
  applyFilters();
}

function populateTypeFilter() {
  const select = document.getElementById('filterType');
  const current = select.value;
  const types = [...new Set(allSubmissions.map(s => s.license_type))].sort();
  select.innerHTML = '<option value="">Все типы заявок</option>' +
    types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  select.value = current;
}

function renderStats() {
  document.getElementById('statTotal').textContent    = allSubmissions.length;
  document.getElementById('statNew').textContent      = allSubmissions.filter(s => s.status === 'new').length;
  document.getElementById('statReview').textContent   = allSubmissions.filter(s => s.status === 'review').length;
  document.getElementById('statApproved').textContent = allSubmissions.filter(s => s.status === 'approved').length;
  document.getElementById('statRejected').textContent = allSubmissions.filter(s => s.status === 'rejected').length;
}

// ── SORT ──
function sortBy(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortField = field; sortDir = 'asc';
  }
  // Update header arrows
  document.querySelectorAll('thead th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  const clicked = [...document.querySelectorAll('thead th.sortable')]
    .find(th => th.getAttribute('onclick') === `sortBy('${field}')`);
  if (clicked) clicked.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  applyFilters();
}

// ── FILTERS + SORT ──
function applyFilters() {
  const type   = document.getElementById('filterType').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = allSubmissions;
  if (type)   filtered = filtered.filter(s => s.license_type === type);
  if (status) filtered = filtered.filter(s => s.status === status);
  if (search) {
    filtered = filtered.filter(s =>
      (s.nickname || '').toLowerCase().includes(search) ||
      (s.email    || '').toLowerCase().includes(search) ||
      (s.admin_note || '').toLowerCase().includes(search)
    );
  }

  // Sort
  filtered = [...filtered].sort((a, b) => {
    let va = a[sortField] ?? '';
    let vb = b[sortField] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  renderTable(filtered);
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  if (rows.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';
  tbody.innerHTML = rows.map(row => `
    <tr onclick="openModal('${row.id}')">
      <td class="td-type">${escapeHtml(row.license_type || '—')}</td>
      <td class="td-nick">${escapeHtml(row.nickname || '—')}</td>
      <td class="td-nick">${escapeHtml(row.messenger_type || '—')}</td>
      <td class="td-nick">${escapeHtml(row.email || '—')}</td>
      <td>${statusBadge(row.status)}</td>
      <td class="td-date">${formatDate(row.created_at)}</td>
    </tr>
  `).join('');
}

function statusBadge(status) {
  const map = { new: ['new','Новая'], review: ['review','На рассмотрении'], approved: ['approved','Одобрено'], rejected: ['rejected','Отклонено'] };
  const [cls, label] = map[status] || map.new;
  return `<span class="badge ${cls}">${label}</span>`;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── MODAL ──
function openModal(id) {
  const record = allSubmissions.find(s => s.id === id);
  if (!record) return;
  currentRecordId = id;

  document.getElementById('modalTitle').textContent = record.license_type || 'Заявка';
  document.getElementById('modalSubtitle').textContent = `Подана ${formatDate(record.created_at)}`;

  const fields = [
    ['Никнейм', record.nickname],
    ['Мессенджер', record.messenger_type],
    ['Email', record.email],
    ['Возраст', record.age],
    ['Опыт', record.experience],
    ['Цель / тематика', record.goal || record.theme],
    ['Как узнали', record.how_found],
    ['Знает правила', record.knows_rules],
    ['Время в день', record.time_available],
  ];

  document.getElementById('modalBody').innerHTML =
    fields.map(([label, value]) => `
      <div class="detail-row">
        <div class="detail-label">${label}</div>
        <div class="detail-value">${escapeHtml(value) || '—'}</div>
      </div>
    `).join('') + `
      <div class="detail-row">
        <div class="detail-label">Статус</div>
        <div class="detail-value">${statusBadge(record.status)}</div>
      </div>
    `;

  // Restore saved note
  document.getElementById('modalNote').value = record.admin_note || '';

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  currentRecordId = null;
}

// ── SET STATUS (с сохранением заметки) ──
async function setStatus(newStatus) {
  if (!currentRecordId) return;
  const note = document.getElementById('modalNote').value.trim();

  const { error } = await supabaseClient
    .from('submissions')
    .update({ status: newStatus, admin_note: note || null })
    .eq('id', currentRecordId);

  if (error) { showToast('Ошибка обновления: ' + error.message, 'err'); return; }

  const labels = { approved: 'Одобрено ✓', review: 'На рассмотрении', rejected: 'Отклонено' };
  showToast(labels[newStatus] || 'Статус обновлён', newStatus === 'approved' ? 'ok' : newStatus === 'rejected' ? 'err' : 'info');

  // Update local cache without full reload
  const rec = allSubmissions.find(s => s.id === currentRecordId);
  if (rec) { rec.status = newStatus; rec.admin_note = note || null; }
  renderStats();
  applyFilters();
  closeModal();
}

// ── DELETE ──
async function deleteSubmission() {
  if (!currentRecordId) return;
  if (!confirm('Удалить эту заявку без возможности восстановления?')) return;

  const { error } = await supabaseClient.from('submissions').delete().eq('id', currentRecordId);
  if (error) { showToast('Ошибка удаления: ' + error.message, 'err'); return; }

  showToast('Заявка удалена', 'info');
  allSubmissions = allSubmissions.filter(s => s.id !== currentRecordId);
  renderStats();
  applyFilters();
  closeModal();
}

// ── EXPORT CSV ──
function exportCSV() {
  const type   = document.getElementById('filterType').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let rows = allSubmissions;
  if (type)   rows = rows.filter(s => s.license_type === type);
  if (status) rows = rows.filter(s => s.status === status);
  if (search) rows = rows.filter(s =>
    (s.nickname || '').toLowerCase().includes(search) ||
    (s.email    || '').toLowerCase().includes(search) ||
    (s.admin_note || '').toLowerCase().includes(search)
  );

  if (rows.length === 0) { showToast('Нет заявок для экспорта', 'info'); return; }

  const headers = ['Дата', 'Тип заявки', 'Никнейм', 'Мессенджер', 'Email', 'Возраст', 'Опыт', 'Цель/Тема', 'Как узнали', 'Знает правила', 'Время в день', 'Статус', 'Комментарий'];
  const escape  = v => `"${String(v ?? '').replace(/"/g, '""')}"`;

  const csv = [
    headers.join(';'),
    ...rows.map(r => [
      formatDate(r.created_at), r.license_type, r.nickname, r.messenger_type,
      r.email, r.age, r.experience, r.goal || r.theme,
      r.how_found, r.knows_rules, r.time_available, r.status, r.admin_note
    ].map(escape).join(';'))
  ].join('\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `neway-rp-submissions-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Экспортировано ${rows.length} заявок`, 'ok');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
